<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Village Animation</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sky">

  <div class="sun"></div>

  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>

  <div class="bird bird1"></div>
  <div class="bird bird2"></div>

</div>

<div class="tree">

  <div class="leaves"></div>

  <div class="trunk"></div>

  <div class="mango m1"></div>
  <div class="mango m2"></div>
  <div class="mango m3"></div>

</div>

<div class="house">

  <div class="roof"></div>
  <div class="door"></div>

</div>

<div class="river"></div>

<div class="person woman">

  <div class="head"></div>
  <div class="body saree"></div>

  <div class="leg1"></div>
  <div class="leg2"></div>

</div>

<div class="person man">

  <div class="head"></div>
  <div class="body shirt"></div>

  <div class="leg1"></div>
  <div class="leg2"></div>

</div>

<div class="cow">

  <div class="cow-body"></div>
  <div class="cow-head"></div>

</div>

<div class="ground"></div>

<script src="script.js"></script>

</body>
</html>
